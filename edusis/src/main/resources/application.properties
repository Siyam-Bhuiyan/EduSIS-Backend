spring.application.name=edusis

# Database Configuration - H2 (for testing)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Enable H2 Console (for debugging)
spring.h2.console.enabled=true

# PostgreSQL Database configuration (commented out for now)
#spring.datasource.url=jdbc:postgresql://localhost:5432/EduSIS
#spring.datasource.username=postgres
#spring.datasource.password=siyam
#spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=5000
